<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager - CafePro</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body class="bg-stone-50 pb-10" onload="loadReport()">
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-stone-800">Manager <span class="text-amber-600">Overview</span></h1>
        <button onclick="logout()" class="text-red-500 font-bold flex items-center gap-2">
            <i class="fa-solid fa-power-off"></i> Logout
        </button>
    </nav>

    <div class="max-w-6xl mx-auto px-6 mt-10 space-y-8">
        <!-- Dashboard Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-indigo-600 p-8 rounded-3xl text-white shadow-lg">
                <h3 class="text-lg font-medium opacity-80">Total Orders</h3>
                <p id="tOrders" class="text-5xl font-black mt-2">0</p>
            </div>
            <div class="bg-emerald-600 p-8 rounded-3xl text-white shadow-lg">
                <h3 class="text-lg font-medium opacity-80">Total Revenue</h3>
                <p class="text-5xl font-black mt-2">৳<span id="tRevenue">0</span></p>
            </div>
        </div>

        <!-- Detailed Income Sheet -->
        <div class="bg-white rounded-3xl border border-stone-200 shadow-sm overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-white">
                <h3 class="font-bold text-xl text-stone-800">Detailed Income Sheet</h3>
                <button onclick="downloadExcel()" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition flex items-center gap-2 shadow-md">
                    <i class="fa-solid fa-file-csv"></i> Download CSV
                </button>
            </div>
            <div class="p-6 overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-stone-50 border-b">
                        <tr class="text-stone-500 text-xs uppercase tracking-widest">
                            <th class="p-4">Order ID</th>
                            <th class="p-4">Customer</th>
                            <th class="p-4">Item</th>
                            <th class="p-4">Price</th>
                            <th class="p-4">Staff/Rider</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="mTable" class="text-sm text-stone-700">
                        <!-- Data will load here from Render -->
                    </tbody>
                </table>
                <div id="loadingText" class="text-center py-10 text-stone-400">Fetching live data from cloud...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://cafepro-project.onrender.com/api/orders';
        const curUser = JSON.parse(localStorage.getItem('currentUser'));

        // --- Load Manager Report from MongoDB ---
        async function loadReport() {
            if(!curUser || curUser.role !== 'manager') {
                // Security Check: If not manager, send back to login
                // Note: Only works if roles are set correctly in DB
            }

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Filter to show only orders (not menu items or user accounts)
                const orders = data.filter(x => x.status);
                
                document.getElementById('loadingText').classList.add('hidden');
                document.getElementById('tOrders').innerText = orders.length;

                // Calculate Revenue from completed/Received orders only
                const totalIncome = orders.reduce((sum, item) => {
                    return item.status === 'Received' ? sum + (item.price || 0) : sum;
                }, 0);
                document.getElementById('tRevenue').innerText = totalIncome;

                // Render Table Rows
                const tableBody = document.getElementById('mTable');
                if(orders.length > 0) {
                    tableBody.innerHTML = orders.reverse().map(x => `
                        <tr class="border-b hover:bg-stone-50 transition">
                            <td class="p-4 font-mono text-xs">#${x.id}</td>
                            <td class="p-4 font-bold">${x.customer}</td>
                            <td class="p-4">${x.item}</td>
                            <td class="p-4 text-emerald-600 font-bold font-mono">৳${x.price}</td>
                            <td class="p-4">
                                <span class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-[10px] font-bold">
                                    ${x.deliveredBy || x.handledBy || 'Unassigned'}
                                </span>
                            </td>
                            <td class="p-4 font-black uppercase text-[10px] ${x.status === 'Received' ? 'text-emerald-500' : 'text-amber-500'}">
                                ${x.status}
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-stone-400">No orders found in database.</td></tr>';
                }
            } catch (err) {
                console.error("Manager Report Error:", err);
                document.getElementById('loadingText').innerText = "Failed to connect to cloud server.";
            }
        }

        // --- Export CSV from MongoDB Data ---
        async function downloadExcel() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const orders = data.filter(x => x.status);
                
                let csv = "ID,Customer,Item,Price,HandledBy,DeliveredBy,Status\n" + 
                    orders.map(x => `${x.id},${x.customer},${x.item},${x.price},${x.handledBy || 'N/A'},${x.deliveredBy || 'N/A'},${x.status}`).join("\n");
                
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "CafePro_Income_Sheet.csv";
                a.click();
            } catch (err) {
                alert("Could not download report. Server error.");
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // Auto-refresh report every 30 seconds for the Manager
        setInterval(loadReport, 30000);
    </script>
</body>
</html>
