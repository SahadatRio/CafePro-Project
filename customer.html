<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer - CafePro</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body class="bg-stone-50 pb-10" onload="initCustomer()">
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-stone-800">Cafe<span class="text-amber-600">Pro</span></h1>
        <span class="font-bold text-stone-600">Welcome, <span id="cusName" class="text-amber-600"></span></span>
        <button onclick="logout()" class="text-red-500 font-bold"><i class="fa-solid fa-power-off"></i></button>
    </nav>

    <div class="max-w-7xl mx-auto px-6 mt-10 grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2">
            <h3 class="text-2xl font-black mb-6">Menu</h3>
            <div id="dynamicMenu" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
        <div>
            <h3 class="text-2xl font-black mb-6">My Live Orders</h3>
            <div id="myOrders" class="space-y-4"></div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="payModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-bold mb-4 text-center">Checkout</h3>
            
            <div id="deliveryStep" class="space-y-4">
                <p class="font-bold text-stone-600">Order Type:</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setOrderType('Dine-In')" id="btnDine" class="py-3 border-2 rounded-xl font-bold border-stone-200">Dine-In</button>
                    <button onclick="setOrderType('Home Delivery')" id="btnHome" class="py-3 border-2 rounded-xl font-bold border-stone-200">Home Delivery</button>
                </div>
                <div id="addressBox" class="hidden">
                    <textarea id="orderAddress" class="w-full p-3 bg-stone-50 border rounded-xl" placeholder="Address or Table No..."></textarea>
                </div>
                <button onclick="goToPayment()" class="w-full bg-stone-900 text-white font-bold py-3 rounded-xl mt-4">Next</button>
            </div>

            <div id="payStep" class="hidden space-y-3">
                <button onclick="showInputForm('bKash')" class="w-full bg-pink-600 text-white font-bold py-3 rounded-xl">bKash</button>
                <button onclick="showInputForm('Card')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Card</button>
                <button onclick="finalizeOrder('Cash on Delivery')" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Cash on Delivery</button>
            </div>

            <div id="payInputForm" class="hidden space-y-4">
                <p id="payInstruction" class="text-center text-xs font-bold text-stone-500 uppercase"></p>
                <input type="text" id="payAccountNum" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full p-3 border-2 rounded-xl text-center font-bold" placeholder="Account Number">
                <input type="password" id="payPinNum" maxlength="4" class="w-full p-3 border-2 rounded-xl text-center" placeholder="4-Digit PIN">
                <button onclick="validateAndFinalize()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Confirm & Pay</button>
            </div>

            <button onclick="closeModal()" class="w-full mt-4 text-stone-400 font-bold">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = '[https://cafepro-project.onrender.com/api/orders](https://cafepro-project.onrender.com/api/orders)';
        const user = JSON.parse(localStorage.getItem('currentUser'));
        let tempOrder = null, selectedMethod = '', orderType = '';

        function initCustomer() { 
            if(!user) window.location.href = 'index.html';
            document.getElementById('cusName').innerText = user.username; 
            loadMenu(); 
            loadOrders(); 
        }
        
       async function displayMenu() {
    const API_URL = 'https://cafepro-project.onrender.com/api/orders';
    const menuGrid = document.getElementById('menu-grid'); // Make sure your HTML has an element with this ID

    try {
        const response = await fetch(API_URL);
        const allData = await response.json();

        // Filtering data to only show objects that are 'menu_item'
        const menuItems = allData.filter(item => item.type === 'menu_item');

        if(menuItems.length > 0) {
            menuGrid.innerHTML = ''; // Clearing old data
            menuItems.forEach(item => {
                menuGrid.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 transform hover:scale-105 transition-all">
                        <h3 class="text-xl font-bold text-gray-800">${item.name}</h3>
                        <p class="text-amber-600 font-extrabold mt-2">${item.price} BDT</p>
                        <button onclick="addToCart('${item.name}', ${item.price})" class="mt-4 w-full bg-amber-600 text-white py-2 rounded-xl font-bold hover:bg-amber-700 transition">
                            Add to Order
                        </button>
                    </div>
                `;
            });
        } else {
            menuGrid.innerHTML = '<p class="text-center text-gray-500">No items available in the menu yet.</p>';
        }
    } catch (err) {
        console.error("Error fetching menu:", err);
    }
}

// Automatically load menu when page opens
window.onload = displayMenu;

        function openPay(n, p) { 
            tempOrder = { n, p }; 
            document.getElementById('deliveryStep').classList.remove('hidden');
            document.getElementById('payStep').classList.add('hidden');
            document.getElementById('payInputForm').classList.add('hidden');
            document.getElementById('payModal').classList.remove('hidden'); 
        }

        function setOrderType(type) {
            orderType = type;
            document.getElementById('addressBox').classList.remove('hidden');
            document.getElementById('btnDine').className = type === 'Dine-In' ? 'py-3 border-2 rounded-xl font-bold border-emerald-500 bg-emerald-50' : 'py-3 border-2 rounded-xl font-bold border-stone-200';
            document.getElementById('btnHome').className = type === 'Home Delivery' ? 'py-3 border-2 rounded-xl font-bold border-emerald-500 bg-emerald-50' : 'py-3 border-2 rounded-xl font-bold border-stone-200';
        }

        function goToPayment() {
            if(!orderType || !document.getElementById('orderAddress').value) return alert("Select type and enter details!");
            document.getElementById('deliveryStep').classList.add('hidden');
            document.getElementById('payStep').classList.remove('hidden');
        }

        function showInputForm(m) {
            selectedMethod = m;
            document.getElementById('payStep').classList.add('hidden');
            document.getElementById('payInputForm').classList.remove('hidden');
            const accInput = document.getElementById('payAccountNum');
            accInput.value = '';
            document.getElementById('payInstruction').innerText = m === 'bKash' ? "Enter 11-Digit bKash Number" : "Enter 16-Digit Card Number";
            accInput.setAttribute('maxlength', m === 'bKash' ? '11' : '16');
        }

        function validateAndFinalize() {
            const acc = document.getElementById('payAccountNum').value;
            const pin = document.getElementById('payPinNum').value;
            if (selectedMethod === 'bKash' && acc.length !== 11) return alert("bKash must be 11 digits");
            if (selectedMethod === 'Card' && acc.length !== 16) return alert("Card must be 16 digits");
            if (pin.length < 4) return alert("PIN must be 4 digits");
            finalizeOrder(selectedMethod);
        }

        // --- Order Processing (MongoDB POST) ---
        async function finalizeOrder(m) {
            const newOrder = { 
                id: Math.floor(1000 + Math.random()*8999), 
                customer: user.username, 
                item: tempOrder.n, 
                price: tempOrder.p, 
                status: 'Pending', 
                payType: m,
                type: orderType,
                address: document.getElementById('orderAddress').value,
                securityOTP: Math.floor(1000 + Math.random() * 9000),
                orderTime: new Date().toLocaleString(),
                handledBy: 'Waiting...',
                deliveredBy: '---'
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newOrder)
                });
                
                if (response.ok) {
                    alert("Order Placed Successfully in Cloud!");
                    closeModal();
                    loadOrders();
                }
            } catch (error) {
                console.error("Error saving order:", error);
                alert("Failed to connect to server. Check if backend is running.");
            }
        }

        // --- Update Status (MongoDB PUT) ---
        async function confirmOrderReceived(id) {
            try {
                const updateData = { 
                    status: 'Received', 
                    completionTime: new Date().toLocaleString() 
                };
                
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                if (response.ok) {
                    alert("Order confirmed as received!");
                    loadOrders();
                }
            } catch (error) {
                console.error("Update Error:", error);
            }
        }

        // --- Load Orders (MongoDB GET) ---
        async function loadOrders() {
            try {
                const response = await fetch(API_URL);
                const allOrders = await response.json();
                const myOrders = allOrders.filter(x => x.customer === user.username);
                
                document.getElementById('myOrders').innerHTML = myOrders.reverse().map(x => `
                    <div class="bg-white p-4 border rounded-2xl mb-2 shadow-sm">
                        <div class="flex justify-between font-bold text-stone-800">
                            <span>${x.item}</span>
                            <span class="text-xs text-indigo-600 uppercase">${x.status}</span>
                        </div>
                        <p class="text-[10px] text-stone-400 mt-1">${x.orderTime}</p>
                        
                        ${x.status !== 'Received' ? `
                            <p class="mt-2 text-center bg-stone-50 p-2 rounded-xl border border-dashed font-bold text-emerald-600">OTP: ${x.securityOTP}</p>
                            <button onclick="confirmOrderReceived(${x.id})" class="w-full mt-3 bg-emerald-600 text-white text-xs py-2 rounded-xl font-bold shadow-sm transition hover:bg-emerald-700">Confirm Received</button>
                        ` : '<p class="text-[10px] text-emerald-600 font-bold mt-2 text-center border-t pt-2">✓ Order Completed</p>'}
                    </div>`).join('');
            } catch (error) {
                console.error("Load Orders Error:", error);
            }
        }

        function closeModal() { document.getElementById('payModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
