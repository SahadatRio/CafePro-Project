<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - CafePro</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body class="bg-stone-100 pb-10" onload="loadMenu(); loadAdminReport();">
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black">Cafe<span class="text-amber-600">Pro</span> Admin</h1>
        <button onclick="logout()" class="text-red-500 font-bold">Logout</button>
    </nav>

    <div class="max-w-7xl mx-auto px-6 mt-10 grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Menu Management -->
        <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-200">
            <h3 class="text-xl font-bold mb-6">Menu Management</h3>
            <div class="flex gap-2 mb-6">
                <input type="text" id="itemName" class="flex-1 p-3 bg-stone-50 border rounded-xl" placeholder="Item Name">
                <input type="number" id="itemPrice" class="w-24 p-3 bg-stone-50 border rounded-xl" placeholder="Price">
                <button onclick="addMenu()" class="bg-emerald-600 text-white px-6 rounded-xl transition">Add</button>
            </div>
            <div id="menuList" class="space-y-2"></div>
        </div>
        
        <!-- Reports section remains similar -->
    </div>

    <script>
        const API_URL = 'https://cafepro-project.onrender.com/api/orders';

        async function addMenu() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;

            if(!name || !price) return alert("Fill all fields");

            const newItem = { name, price: parseInt(price), type: 'menu_item', available: true };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newItem)
                });
                alert("Item added to Cloud!");
                location.reload();
            } catch (err) { alert("Error adding item"); }
        }

        async function loadMenu() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const items = data.filter(x => x.type === 'menu_item');
            document.getElementById('menuList').innerHTML = items.map(m => `
                <div class="flex justify-between p-4 border rounded-2xl bg-white">
                    <span>${m.name} - <b>${m.price} BDT</b></span>
                </div>`).join('');
        }

        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
