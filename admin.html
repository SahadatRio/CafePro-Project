<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - CafePro</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body class="bg-stone-100 pb-10 font-sans text-stone-800" onload="initAdmin()">
    <!-- Navigation -->
    <nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-black">Cafe<span class="text-amber-600">Pro</span> Admin</h1>
        <div class="flex items-center gap-4">
            <span class="text-xs font-bold text-stone-400 uppercase tracking-widest">Master Control</span>
            <button onclick="logout()" class="text-red-500 hover:text-red-700 font-bold transition flex items-center gap-2">
                <i class="fa-solid fa-power-off"></i> Logout
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 mt-10 space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Employee Registration -->
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-200">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-id-card-clip text-indigo-500"></i> Register Staff & Rider
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <input type="text" id="newEmpId" class="p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold uppercase" placeholder="Emp ID*">
                    <input type="text" id="newUser" class="p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Username*">
                </div>
                <div class="space-y-3">
                    <input type="email" id="newEmail" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Email Address*">
                    <div class="relative flex">
                        <div class="flex items-center justify-center px-4 bg-stone-200 border border-stone-200 rounded-l-xl border-r-0 font-bold">+88</div>
                        <input type="tel" id="newPhone" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-r-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="11-Digit Phone*">
                    </div>
                    <input type="password" id="newPass" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Password*">
                    <select id="newRole" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl font-bold text-stone-600">
                        <option value="staff">Staff (Kitchen)</option>
                        <option value="manager">Manager (Admin)</option>
                        <option value="delivery">Delivery Person (Rider)</option>
                    </select>
                    <button onclick="createUser()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-md transition transform active:scale-95">Create Account</button>
                </div>
            </div>

            <!-- Menu Item Management -->
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-200 flex flex-col">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-utensils text-emerald-500"></i> Cafe Menu Management</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="itemName" class="flex-1 p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none" placeholder="Item Name">
                    <input type="number" id="itemPrice" class="w-24 p-3 bg-stone-50 border border-stone-200 rounded-xl outline-none" placeholder="৳">
                    <button onclick="addMenu()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 rounded-xl transition"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="menuList" class="space-y-2 overflow-y-auto max-h-[320px] pr-2"></div>
            </div>
        </div>

        <!-- Master Order Database Report -->
        <div class="bg-white rounded-3xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="bg-stone-800 p-6 text-white flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold">Order Tracking Database</h3>
                    <p class="text-xs text-stone-400 mt-1 uppercase tracking-widest">System Analysis & Design Report</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-stone-400 uppercase">Total Revenue</p>
                    <p class="text-2xl font-black text-emerald-400">৳<span id="adminTotalIncome">0</span></p>
                </div>
            </div>
            <div class="p-6 overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-stone-400 text-[10px] uppercase tracking-wider border-b border-stone-100">
                            <th class="pb-4 pl-4">Order ID</th>
                            <th class="pb-4">Customer Details</th>
                            <th class="pb-4">Product</th>
                            <th class="pb-4">Revenue</th>
                            <th class="pb-4">Served By</th>
                            <th class="pb-4 pr-4">Process State</th>
                        </tr>
                    </thead>
                    <tbody id="adminOrderTable" class="text-sm"></tbody>
                </table>
            </div>
            <div class="bg-stone-50 p-4 border-t border-stone-100 flex justify-end">
                <button onclick="downloadExcel()" class="bg-white border border-stone-200 text-stone-700 hover:bg-stone-100 px-6 py-2 rounded-xl text-sm font-bold shadow-sm transition flex items-center gap-2">
                    <i class="fa-solid fa-file-export text-emerald-500"></i> Export System Logs
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://cafepro-project.onrender.com/api/orders';

        function initAdmin() { 
            loadMenu(); 
            loadAdminReport(); 
            // অটো রিফ্রেশ রিপোর্ট প্রতি ১০ সেকেন্ডে
            setInterval(loadAdminReport, 10000);
        }

        // --- Menu Functions (Connected to Cloud) ---
        async function loadMenu() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const menu = data.filter(x => x.type === 'menu_item');
                
                document.getElementById('menuList').innerHTML = menu.map(m => `
                    <div class="flex justify-between items-center p-4 border border-stone-100 rounded-2xl ${m.available ? 'bg-white' : 'bg-stone-50 opacity-60'}">
                        <span class="font-bold text-stone-700">${m.name} <span class="text-emerald-600 ml-2">৳${m.price}</span></span>
                        <div class="text-[10px] bg-emerald-50 text-emerald-600 font-black px-4 py-2 rounded-lg uppercase">Cloud Saved</div>
                    </div>`).join('');
            } catch (err) { console.error("Menu Load Error:", err); }
        }

        async function addMenu() {
            const n = document.getElementById('itemName').value, p = document.getElementById('itemPrice').value;
            if(!n || !p) return alert("Fill Name and Price!");
            
            const newItem = { name: n, price: parseFloat(p), type: 'menu_item', available: true };
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newItem)
                });
                document.getElementById('itemName').value = ''; document.getElementById('itemPrice').value = '';
                loadMenu();
            } catch (err) { alert("Error adding item to Cloud"); }
        }

        // --- User Registration (Saves to MongoDB) ---
        async function createUser() {
            const empId = document.getElementById('newEmpId').value.toUpperCase();
            const u = document.getElementById('newUser').value;
            const e = document.getElementById('newEmail').value;
            const ph = document.getElementById('newPhone').value;
            const p = document.getElementById('newPass').value;
            const r = document.getElementById('newRole').value;
            
            if(!empId || !u || !e || !ph || !p) return alert("Error: Please fill all fields.");
            
            const newUser = { 
                employeeId: empId, 
                username: u, 
                email: e, 
                phone: "+88" + ph, 
                password: p, 
                role: r,
                type: 'user_account' 
            }; 

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newUser)
                });
                if(res.ok) {
                    alert(`Account created for ${u}! Data saved to Cloud.`);
                    ['newEmpId', 'newUser', 'newEmail', 'newPhone', 'newPass'].forEach(id => document.getElementById(id).value = '');
                }
            } catch (err) { alert("Cloud Registration Failed!"); }
        }

        // --- Order Tracking (Connected to MongoDB) ---
        async function loadAdminReport() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                // ফিল্টার করে শুধু অর্ডারগুলো নেওয়া হচ্ছে (মেনু বা ইউজার নয়)
                const orders = data.filter(x => x.status);
                
                let income = 0;
                document.getElementById('adminOrderTable').innerHTML = orders.reverse().map(o => {
                    if (o.status === 'Received') income += o.price;
                    return `<tr class="border-b text-xs">
                        <td class="p-4">#${o.id}<br>${o.orderTime}</td>
                        <td class="p-4 font-bold">${o.customer}<br>${o.type}</td>
                        <td class="p-4">${o.item}</td>
                        <td class="p-4 font-bold">৳${o.price}</td>
                        <td class="p-4 text-indigo-600 font-bold">
                            Handling: ${o.handledBy || 'Pending'}<br>
                            Delivered By: ${o.deliveredBy || '---'}
                        </td>
                        <td class="p-4 font-black uppercase text-stone-500">${o.status}</td>
                    </tr>`;
                }).join('');
                document.getElementById('adminTotalIncome').innerText = income;
            } catch (err) { console.error("Report Error:", err); }
        }

        async function downloadExcel() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const o = data.filter(x => x.status);
                let csv = "Order ID,Order Time,Customer,Type,Item,Price,Delivered By,Status\n" + 
                    o.map(x => `${x.id},${x.orderTime},${x.customer},${x.type},${x.item},${x.price},${x.deliveredBy || 'N/A'},${x.status}`).join("\n");
                let b = new Blob([csv], { type: 'text/csv' }); let a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "CafePro_Live_Logs.csv"; a.click();
            } catch (err) { alert("Export Failed"); }
        }

        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
