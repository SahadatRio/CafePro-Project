<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery - CafePro</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body class="bg-stone-50 pb-10 font-sans text-stone-800" onload="loadDeliveryTasks()">
    <!-- Top Navigation -->
    <nav class="bg-stone-900 text-white px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-motorcycle text-amber-500 text-2xl"></i>
            <h1 class="text-2xl font-black uppercase tracking-tighter">Rider <span class="text-amber-500">Fleet</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-xs font-bold">Rider: <span id="rName" class="text-amber-400"></span></span>
            <button onclick="logout()" class="text-red-400 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 mt-10">
        <h3 class="text-2xl font-black mb-6 flex items-center gap-2">
            <i class="fa-solid fa-route text-stone-400"></i> Active Delivery Tasks
        </h3>
        
        <!-- List of Orders -->
        <div id="deliveryGrid" class="space-y-4">
            <p class="text-stone-400">Checking for ready orders...</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://cafepro-project.onrender.com/api/orders';
        const cur = JSON.parse(localStorage.getItem('currentUser'));

        // --- Load tasks from MongoDB via Render API ---
        async function loadDeliveryTasks() {
            if(!cur) { window.location.href = 'index.html'; return; }
            document.getElementById('rName').innerText = cur.username;
            
            try {
                const res = await fetch(API_URL);
                const orders = await res.json();
                
                // Rider only sees orders that are 'Ready' or 'Out for Delivery'
                let activeTasks = orders.filter(x => x.status === 'Ready' || x.status === 'Out for Delivery');
                
                const grid = document.getElementById('deliveryGrid');
                if(activeTasks.length > 0) {
                    grid.innerHTML = activeTasks.reverse().map(x => {
                        let statusBadge = x.status === 'Ready' ? 'bg-yellow-100 text-yellow-700' : 'bg-blue-100 text-blue-700';
                        
                        return `
                        <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-[10px] font-black text-stone-400 uppercase">Order #${x.id}</span>
                                    <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase ${statusBadge}">${x.status}</span>
                                </div>
                                <h3 class="text-xl font-bold text-stone-800">${x.item}</h3>
                                <div class="mt-3 space-y-1">
                                    <p class="text-sm font-bold text-indigo-600"><i class="fa-solid fa-location-dot mr-2"></i> ${x.type}: ${x.address}</p>
                                    <p class="text-xs text-stone-500"><i class="fa-solid fa-user mr-2"></i> Customer: ${x.customer}</p>
                                </div>
                            </div>
                            
                            <div class="flex gap-2 w-full md:w-auto">
                                ${x.status === 'Ready' ? `
                                    <button onclick="updateStatus('${x._id}', 'Out for Delivery')" class="flex-1 bg-stone-800 hover:bg-black text-white px-6 py-3 rounded-xl text-sm font-bold transition shadow-md">
                                        <i class="fa-solid fa-box mr-2"></i> Pick Up
                                    </button>
                                ` : ''}

                                <button onclick="completeWithOTP('${x._id}', ${x.id}, ${x.securityOTP})" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-md transition">
                                    <i class="fa-solid fa-check-double mr-2"></i> Complete
                                </button>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    grid.innerHTML = '<p class="text-center text-stone-500 py-10">No active delivery tasks found.</p>';
                }
            } catch (err) { console.error("Task Load Error:", err); }
        }

        // --- Update Status to 'Out for Delivery' (PUT) ---
        async function updateStatus(mongoId, s) {
            try {
                const updateData = { 
                    status: s, 
                    handledBy: cur.username // লগ করা হচ্ছে কোন রাইডার পিক আপ করলো
                };
                
                await fetch(`${API_URL}/${mongoId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });
                loadDeliveryTasks();
            } catch (err) { alert("Pickup Failed!"); }
        }

        // --- Complete Delivery with OTP Verification (PUT) ---
        async function completeWithOTP(mongoId, simpleId, correctOTP) {
            let inputOTP = prompt(`Enter 4-Digit Security OTP from Customer for Order #${simpleId}:`);
            
            if(inputOTP == correctOTP) {
                try {
                    const updateData = { 
                        status: 'Received', 
                        deliveredBy: cur.username, 
                        completionTime: new Date().toLocaleString() 
                    };
                    
                    const res = await fetch(`${API_URL}/${mongoId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updateData)
                    });

                    if(res.ok) {
                        alert("✅ Delivery verified and completed!");
                        loadDeliveryTasks();
                    }
                } catch (err) { alert("Server Error during completion."); }
            } else if (inputOTP !== null) {
                alert("❌ Wrong OTP! You cannot complete delivery without the customer's code.");
            }
        }

        function logout() { 
            localStorage.removeItem('currentUser'); 
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
